name: 基金日报定时推送

on:
  # 定时改由 cron-job.org 触发 workflow_dispatch，见 docs/外部定时触发-cron-job.org.md 
  workflow_dispatch:
#
permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://api.deepseek.com' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
          LLM_TEMPERATURE: '0.3'
          EMAIL_ENABLED: 'true'
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          REPORT_PUBLIC_BASE_URL: https://stj001.github.io/investmentFund
        # 分析必须用实时数据，禁止 --cache
        run: python scripts/daily_report.py

      - name: Commit published report and batch state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/reports/ docs/data/ config/batch_state.json
          git diff --staged --quiet || git commit -m "chore: publish daily report"
          git push

      - name: Send failure alert
        if: failure()
        env:
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: '465'
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python scripts/notify_failure.py || true

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: |
            reports/
            data/advice/
            data/checklist/
            config/batch_state.json
          retention-days: 30
